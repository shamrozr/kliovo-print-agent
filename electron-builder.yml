appId: com.kliovo.print-agent
productName: Kliovo Print Agent
copyright: Copyright 2026 Kliovo

directories:
  output: release

files:
  - dist/**/*
  - src/windows/settings/index.html
  - src/windows/settings/renderer.js
  - assets/**/*
  - package.json
  - node_modules/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: true
  shortcutName: Kliovo Print Agent

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.utilities
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: Kliovo Print Agent
  background: ~

publish:
  provider: github
  owner: shamrozr
  repo: kliovo-print-agent
  releaseType: release
