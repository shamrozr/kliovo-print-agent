<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'">
  <title>Kliovo Print Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           font-size: 13px; background: #0f1117; color: #e2e8f0;
           padding: 20px; min-height: 100vh; }
    h1   { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #f8fafc; }
    label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;
            margin-top: 14px; text-transform: uppercase; letter-spacing: .05em; }
    input { width: 100%; padding: 8px 10px; border-radius: 6px;
            border: 1px solid #334155; background: #1e293b;
            color: #f1f5f9; font-size: 13px; }
    input:focus { outline: none; border-color: #3b82f6; }
    .section { font-size: 12px; font-weight: 600; color: #94a3b8;
               margin: 20px 0 10px; text-transform: uppercase; letter-spacing: .05em; }
    .card    { background: #1e293b; border-radius: 8px; padding: 14px;
               margin-bottom: 10px; border: 1px solid #334155; }
    .row     { display: flex; gap: 8px; margin-top: 8px; }
    .row input { flex: 1; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    button   { padding: 7px 14px; border-radius: 6px; border: none;
               font-size: 12px; font-weight: 600; cursor: pointer; }
    .primary { background: #3b82f6; color: #fff; }
    .primary:hover { background: #2563eb; }
    .danger  { background: #ef4444; color: #fff; }
    .danger:hover  { background: #dc2626; }
    .ghost   { background: #334155; color: #cbd5e1; }
    .ghost:hover   { background: #475569; }
    .footer  { display: flex; gap: 10px; margin-top: 24px;
               justify-content: flex-end; align-items: center; }
    .status  { font-size: 11px; color: #64748b; min-height: 16px; }
    .ok      { color: #22c55e; }
    .err     { color: #ef4444; }

    /* ── Live print-status panel ────────────────────────────── */
    .health      { background: #1e293b; border-radius: 8px; padding: 14px;
                   border: 1px solid #334155; }
    .health-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .dot         { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    .dot.green   { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.yellow  { background: #eab308; box-shadow: 0 0 6px #eab30888; }
    .dot.red     { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
    .health-head .lbl { font-size: 13px; font-weight: 600; color: #f1f5f9; }
    .hprinter    { display: flex; align-items: center; gap: 8px; padding: 6px 0;
                   border-top: 1px solid #2a3a52; font-size: 12px; }
    .hprinter:first-of-type { border-top: none; }
    .hprinter .nm { color: #e2e8f0; font-weight: 500; }
    .hprinter .det { color: #64748b; margin-left: auto; font-size: 11px; }
    .recent      { margin-top: 12px; }
    .recent .ev  { font-size: 11px; color: #94a3b8; padding: 3px 0;
                   font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .empty       { font-size: 12px; color: #64748b; }

    /* ── Tabs ───────────────────────────────────────────────── */
    .tabs    { display: flex; gap: 4px; margin-bottom: 18px;
               border-bottom: 1px solid #1e293b; }
    .tab     { padding: 8px 14px; font-size: 12px; font-weight: 600;
               color: #94a3b8; background: none; border: none; cursor: pointer;
               border-bottom: 2px solid transparent; border-radius: 0; }
    .tab:hover  { color: #cbd5e1; }
    .tab.active { color: #f8fafc; border-bottom-color: #3b82f6; }
    .pane    { display: none; }
    .pane.active { display: block; }

    /* ── Offline POS panel ──────────────────────────────────── */
    .badges  { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .badge   { display: inline-flex; align-items: center; gap: 5px;
               font-size: 11px; font-weight: 600; padding: 4px 9px;
               border-radius: 999px; border: 1px solid #334155;
               background: #1e293b; color: #cbd5e1; }
    .badge .bdot { width: 7px; height: 7px; border-radius: 50%; background: #64748b; }
    .badge.good  { border-color: #166534; background: #052e1a; color: #4ade80; }
    .badge.good .bdot  { background: #22c55e; }
    .badge.warn  { border-color: #854d0e; background: #2e1f05; color: #fbbf24; }
    .badge.warn .bdot  { background: #eab308; }

    .kpis    { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
               margin-bottom: 12px; }
    .kpi     { background: #1e293b; border: 1px solid #334155; border-radius: 8px;
               padding: 10px; text-align: center; }
    .kpi .n  { font-size: 18px; font-weight: 700; color: #f8fafc; }
    .kpi .n.alert { color: #fbbf24; }
    .kpi .l  { font-size: 10px; color: #94a3b8; text-transform: uppercase;
               letter-spacing: .04em; margin-top: 2px; }

    .ucount  { font-size: 11px; color: #64748b; margin-left: auto; }
    table.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    table.tbl th { text-align: left; font-size: 10px; text-transform: uppercase;
                   letter-spacing: .04em; color: #64748b; font-weight: 600;
                   padding: 6px 6px; border-bottom: 1px solid #334155; }
    table.tbl td { padding: 7px 6px; border-bottom: 1px solid #1e293b;
                   color: #e2e8f0; }
    table.tbl tr:last-child td { border-bottom: none; }
    .pill    { font-size: 10px; font-weight: 600; padding: 2px 7px;
               border-radius: 999px; background: #334155; color: #cbd5e1; }
    .pill.role { background: #1e3a5f; color: #93c5fd; }
    .pill.pin  { background: #422006; color: #fbbf24; }
    .pill.off  { background: #3f1d1d; color: #fca5a5; }
    .pill.ofl  { background: #422006; color: #fbbf24; }
    .pill.onl  { background: #14342b; color: #6ee7b7; }
    .muted   { color: #64748b; }
    .hint    { font-size: 12px; color: #94a3b8; line-height: 1.5;
               background: #1e293b; border: 1px solid #334155; border-left: 3px solid #3b82f6;
               border-radius: 6px; padding: 12px 14px; }
    .hint b  { color: #f1f5f9; }
    .meta    { font-size: 11px; color: #64748b; display: flex; justify-content: space-between;
               margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Kliovo Print Agent</h1>

  <div class="tabs">
    <button class="tab active" id="tabPrintBtn" data-pane="print">Printing</button>
    <button class="tab" id="tabOfflineBtn" data-pane="offline">Offline POS</button>
  </div>

  <!-- ── Printing pane ──────────────────────────────────────── -->
  <div class="pane active" id="pane-print">
    <div class="section">Print Status</div>
    <div class="health" id="health">
      <div class="health-head">
        <span class="dot" id="healthDot"></span>
        <span class="lbl" id="healthLabel">Loading…</span>
      </div>
      <div id="healthPrinters"></div>
      <div class="recent" id="healthRecent"></div>
    </div>

    <label for="serverUrl">Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://dine.kliovo.com">

    <div class="section">Printers</div>
    <div id="printers"></div>
    <button class="ghost" id="addBtn">+ Add Printer</button>

    <div class="footer">
      <span class="status" id="globalStatus"></span>
      <button class="primary" id="saveBtn">Save</button>
    </div>
  </div>

  <!-- ── Offline POS pane ───────────────────────────────────── -->
  <div class="pane" id="pane-offline">
    <div class="section">Offline Status</div>
    <div class="badges" id="offBadges"></div>

    <div class="section">Stored Data</div>
    <div class="kpis" id="offKpis"></div>

    <div class="section" style="display:flex;align-items:center">
      Cached Logins <span class="ucount" id="offUserCount"></span>
    </div>
    <div class="card" id="offUsersCard"></div>

    <div class="section">Recent Orders</div>
    <div class="card" id="offOrdersCard"></div>

    <div class="section">Storage</div>
    <div class="card" id="offStorageCard"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
